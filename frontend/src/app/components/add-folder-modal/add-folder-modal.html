<div class="modal-backdrop" (click)="onClose()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <!-- Header -->
    <div class="modal-header">
      <h2>{{ editData ? 'Edit folder' : 'Add folder' }}</h2>
      <button type="button" class="modal-close" (click)="onClose()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <!-- Form Content -->
    <form [formGroup]="folderForm" (ngSubmit)="onSubmit()">
      <div class="modal-body">
        <div class="form-layout">
          <div class="form-group">
            <label for="name">Name <span>*</span></label>
            <input type="text" id="name" formControlName="name" placeholder="Folder name" class="form-control" [class.is-invalid]="folderForm.get('name')?.invalid && folderForm.get('name')?.touched">
          </div>

          <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" formControlName="notes" class="form-control" rows="4"></textarea>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="modal-footer">
        <div class="footer-right">
          <button type="button" class="btn btn-secondary" (click)="onClose()">Cancel</button>
          <button type="submit" class="btn btn-primary">{{ editData ? 'Save changes' : 'Add folder' }}</button>
        </div>
      </div>
    </form>
  </div>
</div>
